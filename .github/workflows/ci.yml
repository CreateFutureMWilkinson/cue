name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  GOSEC_VERSION: "v2.22.4"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go build artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: go-build-${{ runner.os }}-

      - name: Verify module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint
        run: |
          test -z "$(gofmt -l .)" || (echo "Files need formatting:" && gofmt -l . && exit 1)
          go vet ./...

      - name: Run tests
        run: go test -count=1 -race ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache gosec binary
        id: cache-gosec
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gosec
          key: gosec-${{ runner.os }}-${{ env.GOSEC_VERSION }}

      - name: Install gosec
        if: steps.cache-gosec.outputs.cache-hit != 'true'
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}

      - name: Run gosec
        run: ~/go/bin/gosec ./...

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache govulncheck binary
        id: cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}

      - name: Install govulncheck
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Run govulncheck
        run: ~/go/bin/govulncheck ./...
